name: Power-Automate-Desktop-Versions-Release
on:
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '*/5 * * * *'
jobs:
  build:
    runs-on: windows-latest
    steps:

    - name: Download and Organize Power Automate Desktop Versions
      run: |
        # Download Power Automate for desktop
        $fileName = "Setup.Microsoft.PowerAutomate.exe"
        Invoke-WebRequest -Uri https://go.microsoft.com/fwlink/?linkid=2102613 -OutFile $fileName
        $version = $((Get-Item $fileName).VersionInfo.ProductVersion)
        
        # Create subfolder
        $baseDir = "Power Automate Versions"
        $subDir = Join-Path -Path $baseDir -ChildPath $version
        if (-not (Test-Path -Path $subDir)) {
            New-Item -ItemType Directory -Path $subDir
            
        # Move the exe file to the new version subfolder
        Move-Item -Path $fileName -Destination (Join-Path -Path $subDir -ChildPath $fileName)
        } else {
        Write-Host "Directory for version $version already exists. Skipping file placement."
        }

        # Create GitHub release
        $token = "${{ secrets.GITHUB_TOKEN }}"
        $apiUrl = "https://api.github.com/repos/apchevski/Power-Automate-Desktop-Versions/releases"
        $headers = @{
            "Accept" = "application/vnd.github+json"
            "Authorization" = "Bearer $token"
            "X-GitHub-Api-Version" = "2022-11-28"
        }
        $tag = "v$version"
        $body = @{
            tag_name = "$tag"
            target_commitish = "master"
            name = "$version"
            body = ""
            draft = $false
            prerelease = $false
            generate_release_notes = $false
        } | ConvertTo-Json
        $response = Invoke-RestMethod -Uri $apiUrl -Method Post -Headers $headers -Body $body
        $releaseId = $response.id

        # Create GitHub release asset
        $apiUrl = "https://uploads.github.com/repos/apchevski/Power-Automate-Desktop-Versions/releases/$releaseId/assets?name=$fileName"
        $headers = @{
            "Accept" = "application/vnd.github+json"
            "Authorization" = "Bearer $token"
            "X-GitHub-Api-Version" = "2022-11-28"
            "Content-Type" = "application/octet-stream"
        }
        Invoke-RestMethod -Uri $apiUrl -Method Post -Headers $headers -InFile (Join-Path -Path $subDir -ChildPath $fileName)
